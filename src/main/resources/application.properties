spring.application.name=tournament

# PostgreSQL - Railway
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf - enable cache in production for performance
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# HikariCP connection pool - prevent overloading PostgreSQL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA - disable open-in-view to reduce DB connections per request
spring.jpa.open-in-view=false

# Tomcat thread pool - limit concurrent threads
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5

server.port=${PORT:8080}
server.address=0.0.0.0
