<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title th:text="${tournament.name} + ' - Tournament System'">Detail</title>
</head>
<body>
<section th:fragment="content">

<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
    <div class="d-flex align-items-center gap-2">
        <a th:href="@{/}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <span class="fw-bold fs-5" th:text="${tournament.name}">Tournament</span>
        <span class="badge"
              th:classappend="${tournament.status.name() == 'NOT_STARTED'} ? 'bg-secondary' :
                               (${tournament.status.name() == 'ONGOING'} ? 'bg-primary' : 'bg-success')"
              th:text="${tournament.status.name() == 'NOT_STARTED'} ? 'Belum Mulai' :
                         (${tournament.status.name() == 'ONGOING'} ? 'Berlangsung' : 'Selesai')">
        </span>
    </div>
    <div th:if="${tournament.status.name() == 'NOT_STARTED'}" class="d-flex gap-2">
        <form th:action="@{/tournaments/{id}/shuffle(id=${tournament.id})}" method="post">
            <button type="submit" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-shuffle me-1"></i>Acak Urutan
            </button>
        </form>
        <form th:action="@{/tournaments/{id}/generate(id=${tournament.id})}" method="post">
            <button type="submit" class="btn btn-success btn-sm">
                <i class="bi bi-play-fill me-1"></i>Generate Bracket
            </button>
        </form>
    </div>
    <div th:if="${tournament.status.name() != 'NOT_STARTED'}" class="d-flex gap-2 align-items-center">
        <a th:href="@{/tournaments/{id}/view(id=${tournament.id})}"
           target="_blank" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-share me-1"></i>Share Bagan
        </a>
        <button class="btn btn-outline-secondary btn-sm"
                th:attr="data-url=@{/tournaments/{id}/view(id=${tournament.id})}"
                onclick="copyLink(this)">
            <i class="bi bi-link-45deg me-1"></i>Copy Link
        </button>
    </div>
</div>

<div th:if="${success}" class="alert alert-success alert-dismissible py-2 mb-2">
    <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible py-2 mb-2">
    <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
</div>

<div th:if="${tournament.status.name() == 'FINISHED'}" class="champion-card mb-3">
    <div style="font-size:2.5rem">🏆</div>
    <div style="opacity:.7;font-size:.8rem;font-weight:700;letter-spacing:1px">JUARA TOURNAMENT</div>
    <div class="champion-name" th:text="${champion != null ? champion.name : '?'}"></div>
    <div style="font-size:.8rem;opacity:.6;margin-top:4px">
        Tournament selesai · Semua hasil tersimpan
    </div>
</div>

<div class="d-flex gap-3 align-items-start">

  <!-- Sidebar -->
  <div class="sidebar-col">
    <div class="side-card">
      <div class="side-head">
        <i class="bi bi-people me-1"></i>Peserta
        <span class="badge bg-secondary ms-1" style="font-size:.6rem" th:text="${participants.size()}">0</span>
      </div>
      <div th:each="p : ${participants}" class="side-row">
        <span>
          <span class="side-seed" th:text="${p.seed + '.'}">1.</span>
          <span th:text="${p.name}">Name</span>
        </span>
        <span class="d-flex align-items-center gap-1">
          <span class="p-badge"
                th:classappend="${p.status.name() == 'ACTIVE'} ? 'st-active' :
                                (${p.status.name() == 'LOWER_BRACKET'} ? 'st-lower' :
                                (${p.status.name() == 'CHAMPION'} ? 'st-champ' : 'st-out'))"
                th:text="${p.status.name() == 'ACTIVE'} ? 'Aktif' :
                          (${p.status.name() == 'LOWER_BRACKET'} ? 'Lower' :
                          (${p.status.name() == 'CHAMPION'} ? '🏆' : 'Out'))">
          </span>
          <form th:if="${tournament.status.name() == 'NOT_STARTED'}"
                th:action="@{/tournaments/{t}/participants/{pid}/delete(t=${tournament.id},pid=${p.id})}"
                method="post" class="d-inline m-0">
            <button class="side-del" onclick="return confirm('Hapus?')">✕</button>
          </form>
        </span>
      </div>
      <div th:if="${participants.isEmpty()}" style="text-align:center;color:#9ca3af;padding:12px;font-size:.72rem;">
        Belum ada peserta
      </div>
    </div>
  </div>

  <!-- Bracket area -->
  <div class="flex-grow-1" style="min-width:0"
       th:if="${!bracketView.upperRounds.isEmpty()}">

    <!-- Upper Bracket -->
    <div class="mb-4">
      <div class="bk-section-label upper-label"><i class="bi bi-arrow-up-circle"></i>Upper Bracket</div>
      <div class="bk-scroll">
        <div class="bk-stage">
          <th:block th:each="entry, iStat : ${bracketView.upperRounds}">
            <div class="bk-round-col">
              <div class="bk-round-label" th:text="'ROUND ' + ${entry.key}">R1</div>
              <div class="bk-cards">
                <div th:each="match : ${entry.value}" class="bk-slot">
                  <div th:replace="~{fragments/match-card :: matchCard(${match}, ${tournament.id})}"></div>
                </div>
              </div>
            </div>
            <div th:if="${!iStat.last}" class="bk-gap"></div>
          </th:block>
        </div>
      </div>
    </div>

    <!-- Lower Bracket -->
    <div class="mb-4" th:unless="${bracketView.lowerRounds.isEmpty()}">
      <div class="bk-section-label lower-label"><i class="bi bi-arrow-down-circle"></i>Lower Bracket</div>
      <div class="bk-scroll">
        <div class="bk-stage">
          <th:block th:each="entry, iStat : ${bracketView.lowerRounds}">
            <div class="bk-round-col">
              <div class="bk-round-label" th:text="'ROUND ' + ${entry.key}">R1</div>
              <div class="bk-cards">
                <div th:each="match : ${entry.value}" class="bk-slot">
                  <div th:replace="~{fragments/match-card :: matchCard(${match}, ${tournament.id})}"></div>
                </div>
              </div>
            </div>
            <div th:if="${!iStat.last}" class="bk-gap"></div>
          </th:block>
        </div>
      </div>
    </div>

    <!-- Grand Final -->
    <div class="mb-4" th:if="${bracketView.grandFinal != null}">
      <div class="bk-section-label final-label"><i class="bi bi-trophy"></i>Grand Final</div>
      <div style="max-width:220px">
        <div th:replace="~{fragments/match-card :: matchCard(${bracketView.grandFinal}, ${tournament.id})}"></div>
      </div>
    </div>

  </div><!-- /bracket area -->

  <div th:if="${bracketView.upperRounds.isEmpty()}"
       class="flex-grow-1 text-center text-muted py-5">
    <i class="bi bi-diagram-3" style="font-size:3rem"></i>
    <p class="mt-3">Klik <strong>Generate Bracket</strong> untuk membuat bracket.</p>
  </div>

</div><!-- /main layout -->

<style>
/* ── Bracket layout ──────────────────────────── */
.bk-scroll { overflow-x: auto; padding-bottom: 8px; }

/* Stage = flex row of round-cols + gap-divs */
.bk-stage {
    display: flex;
    align-items: flex-start;
    min-width: max-content;
    position: relative;  /* SVG overlay anchors here */
}

/* Round column: label on top, then stacked card slots */
.bk-round-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 210px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
}
.bk-round-label {
    font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
    color: #c4882a; background: #fffbeb; border: 1px solid #fde68a;
    border-radius: 20px; padding: 2px 14px; margin-bottom: 10px;
    white-space: nowrap;
}

/* Each slot is a FIXED height — connector math is based on this */
.bk-cards { display: flex; flex-direction: column; gap: 0; width: 100%; }
.bk-slot  {
    height: 72px;      /* fixed! all cards must fit in this height */
    display: flex;
    align-items: center;
    padding: 6px 0;
    box-sizing: border-box;
}

/* Gap column between rounds — holds the SVG lines (drawn by JS) */
.bk-gap {
    width: 50px;
    flex-shrink: 0;
    align-self: flex-start;
    position: relative;
    z-index: 0;
}

/* ── Match card — fixed compact size ───────── */
.bk-card {
    width: 210px;
    background: #fff;
    border: 1.5px solid #dde2ea;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.bk-card.bk-ready   { border-color: #f87171; }
.bk-card.bk-done    { border-color: #86efac; }
.bk-card.bk-pending { opacity: .6; }

.bk-card-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 2px 7px; background: #f8f9fc; border-bottom: 1px solid #eef0f5;
}
.bk-card-num { font-size: .56rem; font-weight: 700; color: #6b7280; letter-spacing: .3px; }
.bk-badge    { font-size: .52rem; font-weight: 700; border-radius: 3px; padding: 1px 4px; }
.bk-live     { background: #f87171; color: #fff; }
.bk-done-badge { background: #86efac; color: #166534; }

.bk-row {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 7px; border-bottom: 1px solid #f3f4f6; min-height: 22px;
}
.bk-row:last-child { border-bottom: none; }
.bk-row.bk-win  { background: #f0fdf4; }
.bk-row.bk-lose { background: #fef2f2; }

.bk-name       { flex: 1; font-size: .74rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bk-name.bk-tbd{ color: #b8c0cc; font-style: italic; }
.bk-row.bk-win  .bk-name { font-weight: 700; color: #166534; }
.bk-row.bk-lose .bk-name { text-decoration: line-through; color: #9ca3af; }

.bk-score-val  { font-size: .72rem; font-weight: 700; min-width: 18px; text-align: center; flex-shrink: 0; }
.bk-score-win  { color: #166534; }
.bk-score-dash { font-size: .72rem; color: #b8c0cc; min-width: 18px; text-align: center; flex-shrink: 0; }

.bk-wl-badge { font-size: .52rem; font-weight: 800; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
.bk-wl-win   { background: #d1fae5; color: #065f46; }
.bk-wl-lose  { background: #fee2e2; color: #991b1b; }
.bk-wl-empty { font-size: .52rem; color: #d1d5db; flex-shrink: 0; min-width: 20px; }

/* WIN/LOSE badge */
.bk-wl { font-size:.55rem; font-weight:800; border-radius:3px; padding:1px 4px; flex-shrink:0; min-width:28px; text-align:center; }
.bk-wl.win  { background:#d1fae5; color:#065f46; }
.bk-wl.lose { background:#fee2e2; color:#991b1b; }
.bk-wl.empty{ background:#f3f4f6; color:#9ca3af; }
</style>

<script>
/* WIN/LOSE auto-update */
function calcWinner(mid) {
    const s1El = document.getElementById('s1-'+mid);
    const s2El = document.getElementById('s2-'+mid);
    const wl1  = document.getElementById('wl1-'+mid);
    const wl2  = document.getElementById('wl2-'+mid);
    const winEl= document.getElementById('win-'+mid);
    const form = document.getElementById('form-'+mid);
    if (!s1El||!s2El||!form) return;
    const s1=s1El.value!==''?parseInt(s1El.value):null;
    const s2=s2El.value!==''?parseInt(s2El.value):null;
    const p1id=form.dataset.p1id, p2id=form.dataset.p2id;
    if (s1!==null&&s2!==null&&s1!==s2) {
        s1El.style.borderColor=s1>s2?'#22c55e':'#f87171';
        s2El.style.borderColor=s2>s1?'#22c55e':'#f87171';
        if(s1>s2){setWL(wl1,'WIN');setWL(wl2,'LOSE');winEl.value=p1id;}
        else     {setWL(wl1,'LOSE');setWL(wl2,'WIN');winEl.value=p2id;}
    } else {
        s1El.style.borderColor='';s2El.style.borderColor='';
        setWL(wl1,'—');setWL(wl2,'—');winEl.value='';
    }
}
function setWL(el,text){
    if(!el)return; el.textContent=text; el.className='bk-wl';
    if(text==='WIN')el.classList.add('win');
    else if(text==='LOSE')el.classList.add('lose');
    else el.classList.add('empty');
}
function beforeSubmit(form){
    const winEl=form.querySelector('input[name="winnerId"]');
    const s1=parseInt(form.querySelector('[id^="s1-"]')?.value??'');
    const s2=parseInt(form.querySelector('[id^="s2-"]')?.value??'');
    if(!isNaN(s1)&&!isNaN(s2)&&s1!==s2)return true;
    if(!winEl||!winEl.value){alert('Masukkan skor yang berbeda untuk menentukan pemenang.');return false;}
    return true;
}

/* ── Connector lines + equal slot heights ── */
function drawConnectors() {
    document.querySelectorAll('.bk-stage').forEach(stage => {
        stage.querySelectorAll('.conn-svg').forEach(e => e.remove());

        const rounds = Array.from(stage.querySelectorAll(':scope > .bk-round-col'));
        if (rounds.length < 2) return;

        // Step 1: find the tallest card across ALL rounds in this stage
        let globalMaxH = 0;
        rounds.forEach(round => {
            round.querySelectorAll('.bk-slot').forEach(s => {
                s.style.height = 'auto';
                globalMaxH = Math.max(globalMaxH, s.scrollHeight);
            });
        });

        // Step 2: apply slot heights + bracket spacing
        const roundSlots = rounds.map(round => Array.from(round.querySelectorAll('.bk-slot')));
        const sectionText = (stage.closest('.mb-4')?.querySelector('.bk-section-label')?.textContent || '');
        const isUpperStage = /upper/i.test(sectionText);
        let prevTopPad = 0;
        let prevGap = 0;
        let prevCount = roundSlots[0]?.length || 0;

        rounds.forEach((round, ri) => {
            const cards = round.querySelector('.bk-cards');
            const slots = roundSlots[ri];
            let topPad = 0;
            let slotGap = 0;

            // Upper bracket needs exponential vertical spacing per round:
            // R1 gap 0xH, R2 gap 1xH, R3 gap 3xH, R4 gap 7xH, ...
            if (isUpperStage && ri > 0) {
                const multiplier = Math.pow(2, ri);
                topPad = ((multiplier - 1) * globalMaxH) / 2;
                slotGap = (multiplier - 1) * globalMaxH;
            } else if (!isUpperStage && ri > 0) {
                // Lower bracket: spacing follows round-to-round match count transitions.
                const currentCount = slots.length;
                if (currentCount === prevCount) {
                    topPad = prevTopPad;
                    slotGap = prevGap;
                } else if (currentCount > 0 && prevCount > 0 && prevCount % currentCount === 0) {
                    const ratio = prevCount / currentCount;
                    const prevStep = globalMaxH + prevGap;
                    topPad = prevTopPad + ((ratio - 1) * prevStep) / 2;
                    slotGap = Math.max(0, ratio * prevStep - globalMaxH);
                } else {
                    topPad = prevTopPad;
                    slotGap = prevGap;
                }
            }

            if (cards) cards.style.paddingTop = topPad + 'px';
            slots.forEach((s, idx) => {
                s.style.height = globalMaxH + 'px';
                s.style.marginBottom = idx < slots.length - 1 ? (slotGap + 'px') : '0px';
            });

            prevTopPad = topPad;
            prevGap = slotGap;
            prevCount = slots.length;
        });

        // Step 3: create SVG overlay
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.classList.add('conn-svg');
        svg.style.position    = 'absolute';
        svg.style.top         = '0';
        svg.style.left        = '0';
        svg.style.pointerEvents = 'none';
        svg.style.zIndex      = '0';
        svg.style.overflow    = 'visible';
        svg.setAttribute('width',  '1');
        svg.setAttribute('height', '1');
        stage.appendChild(svg);

        // Step 4: measure and draw lines
        const stageRect = stage.getBoundingClientRect();

        for (let ri = 0; ri < rounds.length - 1; ri++) {
            const fromRound = rounds[ri];
            const toRound   = rounds[ri + 1];
            const fromSlots = Array.from(fromRound.querySelectorAll('.bk-slot'));
            const toSlots   = Array.from(toRound.querySelectorAll('.bk-slot'));
            if (!fromSlots.length || !toSlots.length) continue;

            const fromRect = fromRound.getBoundingClientRect();
            const toRect   = toRound.getBoundingClientRect();
            const x0   = fromRect.right - stageRect.left;
            const x1   = toRect.left    - stageRect.left;
            const xMid = (x0 + x1) / 2;

            const centerY = (slot) => {
                const r = slot.getBoundingClientRect();
                return r.top + r.height / 2 - stageRect.top;
            };
            const drawLine = (lx1, ly1, lx2, ly2) => {
                const l = document.createElementNS(svgNS, 'line');
                l.setAttribute('x1', lx1); l.setAttribute('y1', ly1);
                l.setAttribute('x2', lx2); l.setAttribute('y2', ly2);
                l.setAttribute('stroke', '#9aa5bc');
                l.setAttribute('stroke-width', '2.5');
                l.setAttribute('stroke-linecap', 'round');
                svg.appendChild(l);
            };

            if (toSlots.length >= fromSlots.length) {
                // 1->1 style rounds (common in lower bracket)
                for (let i = 0; i < fromSlots.length; i++) {
                    const src = fromSlots[i];
                    const dst = toSlots[Math.min(toSlots.length - 1, Math.floor(i * toSlots.length / fromSlots.length))];
                    if (!src || !dst) continue;
                    const y0 = centerY(src);
                    const y1 = centerY(dst);
                    drawLine(x0, y0, xMid, y0);
                    drawLine(xMid, y0, xMid, y1);
                    drawLine(xMid, y1, x1, y1);
                }
            } else {
                // many->one merge, grouped proportionally
                for (let d = 0; d < toSlots.length; d++) {
                    const destSlot = toSlots[d];
                    if (!destSlot) continue;
                    let start = Math.floor(d * fromSlots.length / toSlots.length);
                    let end = Math.floor((d + 1) * fromSlots.length / toSlots.length) - 1;
                    start = Math.min(start, fromSlots.length - 1);
                    end = Math.max(start, Math.min(end, fromSlots.length - 1));

                    const topSlot = fromSlots[start];
                    const botSlot = fromSlots[end];
                    const destY = centerY(destSlot);
                    if (!topSlot || !botSlot) continue;

                    if (start === end) {
                        const y0 = centerY(topSlot);
                        drawLine(x0, y0, xMid, y0);
                        drawLine(xMid, y0, xMid, destY);
                        drawLine(xMid, destY, x1, destY);
                    } else {
                        const topY = centerY(topSlot);
                        const botY = centerY(botSlot);
                        drawLine(x0, topY, xMid, topY);
                        drawLine(xMid, topY, xMid, botY);
                        drawLine(x0, botY, xMid, botY);
                        drawLine(xMid, destY, x1, destY);
                    }
                }
            }
        }

        svg.setAttribute('width',  stage.scrollWidth);
        svg.setAttribute('height', stage.scrollHeight);
    });
}
function copyLink(btn) {
    const url = window.location.origin + btn.dataset.url;
    navigator.clipboard.writeText(url).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';
        btn.classList.replace('btn-outline-secondary', 'btn-success');
        setTimeout(() => { btn.innerHTML = orig; btn.classList.replace('btn-success','btn-outline-secondary'); }, 2000);
    });
}

window.addEventListener('load', () => {
    drawConnectors();
    setTimeout(drawConnectors, 200);
    setTimeout(drawConnectors, 600);
});
window.addEventListener('resize', drawConnectors);
</script>

<div class="text-center mt-3 mb-2" style="font-size:.75rem; color:#9ca3af;">
    Created by <strong style="color:#6b7280;">Ridhwan Khairullah N </strong>
</div>

</section>
</body>
</html>
