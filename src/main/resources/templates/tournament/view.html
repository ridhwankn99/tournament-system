<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tournament.name} + ' — Bracket View'">Bracket View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
    body { background: #f0f2f8; font-family: 'Segoe UI', sans-serif; font-size: 13px; }

    /* ── Header ─────────────────────────────── */
    .view-header {
        background: #1e293b;
        color: #fff;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }
    .view-title  { font-size: 1.1rem; font-weight: 700; }
    .view-badge  {
        font-size: .65rem; font-weight: 700; border-radius: 4px;
        padding: 2px 8px; background: #3b82f6; color: #fff;
    }
    .view-badge.finished { background: #22c55e; }
    .view-note   { margin-left: auto; font-size: .72rem; color: #94a3b8; }

    /* ── Champion banner ────────────────────── */
    .champion-card {
        background: linear-gradient(135deg, #fbbf24, #f59e0b);
        border-radius: 10px; padding: 16px 24px;
        text-align: center; color: #1c1917; margin: 16px 20px 0;
    }
    .champion-name { font-size: 1.6rem; font-weight: 800; }

    /* ── Section label ──────────────────────── */
    .bk-section-label {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: .72rem; font-weight: 700; padding: 3px 12px;
        border-radius: 20px; margin-bottom: 10px;
    }
    .upper-label { background: #dbeafe; color: #1e40af; }
    .lower-label { background: #fef3c7; color: #92400e; }
    .final-label { background: #ede9fe; color: #5b21b6; }

    /* ── Bracket layout ─────────────────────── */
    .bk-scroll { overflow-x: auto; padding-bottom: 8px; }
    .bk-stage  {
        display: flex; align-items: flex-start;
        min-width: max-content; position: relative;
        padding-bottom: 16px;
    }
    .bk-round-col {
        display: flex; flex-direction: column; align-items: center;
        flex-shrink: 0; position: relative; z-index: 1;
    }
    .bk-round-label {
        font-size: .62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        color: #c4882a; background: #fffbeb; border: 1px solid #fde68a;
        border-radius: 20px; padding: 2px 14px; margin-bottom: 10px; white-space: nowrap;
    }
    .bk-cards { display: flex; flex-direction: column; gap: 0; }
    .bk-slot  { display: flex; align-items: center; padding: 6px 0; box-sizing: border-box; }
    .bk-gap   { width: 50px; flex-shrink: 0; position: relative; z-index: 0; }

    /* ── Match card (read-only) ─────────────── */
    .bk-card {
        width: 210px; background: #fff;
        border: 1.5px solid #dde2ea; border-radius: 8px;
        overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .bk-card.bk-done    { border-color: #86efac; }
    .bk-card.bk-ready   { border-color: #f87171; }
    .bk-card.bk-pending { opacity: .55; }

    .bk-card-head {
        display: flex; justify-content: space-between; align-items: center;
        padding: 2px 7px; background: #f8f9fc; border-bottom: 1px solid #eef0f5;
    }
    .bk-card-num { font-size: .56rem; font-weight: 700; color: #6b7280; letter-spacing: .3px; }
    .bk-badge    { font-size: .52rem; font-weight: 700; border-radius: 3px; padding: 1px 4px; }
    .bk-live     { background: #f87171; color: #fff; }
    .bk-done-badge { background: #86efac; color: #166534; }

    .bk-row {
        display: flex; align-items: center; gap: 4px;
        padding: 4px 7px; border-bottom: 1px solid #f3f4f6; min-height: 24px;
    }
    .bk-row:last-child  { border-bottom: none; }
    .bk-row.bk-win  { background: #f0fdf4; }
    .bk-row.bk-lose { background: #fef2f2; }

    .bk-name      { flex: 1; font-size: .76rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bk-tbd       { color: #b8c0cc; font-style: italic; }
    .bk-row.bk-win  .bk-name { font-weight: 700; color: #166534; }
    .bk-row.bk-lose .bk-name { text-decoration: line-through; color: #9ca3af; }

    .bk-score-val  { font-size: .74rem; font-weight: 700; min-width: 18px; text-align: center; flex-shrink: 0; }
    .bk-score-win  { color: #166534; }
    .bk-score-dash { font-size: .72rem; color: #b8c0cc; min-width: 18px; text-align: center; flex-shrink: 0; }

    .bk-wl-badge { font-size: .52rem; font-weight: 800; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
    .bk-wl-win   { background: #d1fae5; color: #065f46; }
    .bk-wl-lose  { background: #fee2e2; color: #991b1b; }
    .bk-wl-empty { font-size: .52rem; color: #d1d5db; flex-shrink: 0; min-width: 20px; }

    /* ── Participant sidebar ────────────────── */
    .view-sidebar { min-width: 160px; max-width: 160px; flex-shrink: 0; }
    .side-card    { background: #fff; border: 1px solid #e2e5ef; border-radius: 8px; overflow: hidden; }
    .side-head    { background: #f5f6fa; padding: 6px 10px; font-size: .72rem; font-weight: 700; color: #374151; border-bottom: 1px solid #e2e5ef; }
    .side-row     { display: flex; justify-content: space-between; align-items: center; padding: 3px 8px; border-bottom: 1px solid #f3f4f6; font-size: .72rem; }
    .side-seed    { color: #aab; margin-right: 3px; }
    .p-badge      { font-size: .55rem; font-weight: 700; border-radius: 3px; padding: 1px 5px; white-space: nowrap; }
    .st-active    { background: #dbeafe; color: #1d4ed8; }
    .st-lower     { background: #fef3c7; color: #92400e; }
    .st-champ     { background: #d1fae5; color: #065f46; }
    .st-out       { background: #fee2e2; color: #991b1b; }

    /* ── Footer ─────────────────────────────── */
    .view-footer {
        text-align: center; padding: 20px;
        font-size: .7rem; color: #94a3b8; margin-top: 24px;
    }
    </style>
</head>
<body>

<!-- Header -->
<div class="view-header">
    <i class="bi bi-trophy-fill" style="font-size:1.2rem;color:#fbbf24"></i>
    <span class="view-title" th:text="${tournament.name}">Tournament</span>
    <span class="view-badge"
          th:classappend="${tournament.status.name() == 'FINISHED'} ? ' finished' : ''"
          th:text="${tournament.status.name() == 'NOT_STARTED'} ? 'Belum Mulai' :
                    (${tournament.status.name() == 'ONGOING'} ? 'Berlangsung' : 'Selesai')">
    </span>
    <span class="view-note">
        <i class="bi bi-eye me-1"></i>Bracket View — Read Only
    </span>
</div>

<!-- Champion banner -->
<div th:if="${champion != null}" class="champion-card">
    <div style="font-size:2rem">🏆</div>
    <div style="opacity:.7;font-size:.8rem;font-weight:700;letter-spacing:1px">JUARA TOURNAMENT</div>
    <div class="champion-name" th:text="${champion.name}"></div>
</div>

<div class="container-fluid px-4 py-3">
    <div class="d-flex gap-3 align-items-start">

        <!-- Participant sidebar -->
        <div class="view-sidebar">
            <div class="side-card">
                <div class="side-head">
                    <i class="bi bi-people me-1"></i>Peserta
                    <span class="badge bg-secondary ms-1" style="font-size:.58rem"
                          th:text="${participants.size()}">0</span>
                </div>
                <div th:each="p : ${participants}" class="side-row">
                    <span>
                        <span class="side-seed" th:text="${p.seed + '.'}">1.</span>
                        <span th:text="${p.name}">Name</span>
                    </span>
                    <span class="p-badge"
                          th:classappend="${p.status.name() == 'ACTIVE'} ? 'st-active' :
                                          (${p.status.name() == 'LOWER_BRACKET'} ? 'st-lower' :
                                          (${p.status.name() == 'CHAMPION'} ? 'st-champ' : 'st-out'))"
                          th:text="${p.status.name() == 'ACTIVE'} ? 'Aktif' :
                                    (${p.status.name() == 'LOWER_BRACKET'} ? 'Lower' :
                                    (${p.status.name() == 'CHAMPION'} ? '🏆' : 'Out'))">
                    </span>
                </div>
            </div>
        </div>

        <!-- Bracket -->
        <div class="flex-grow-1" style="min-width:0">

            <!-- Upper Bracket -->
            <div class="mb-4" th:unless="${bracketView.upperRounds.isEmpty()}">
                <div class="bk-section-label upper-label">
                    <i class="bi bi-arrow-up-circle"></i>Upper Bracket
                </div>
                <div class="bk-scroll">
                    <div class="bk-stage">
                        <th:block th:each="entry, iStat : ${bracketView.upperRounds}">
                            <div class="bk-round-col">
                                <div class="bk-round-label" th:text="'ROUND ' + ${entry.key}">R1</div>
                                <div class="bk-cards">
                                    <div th:each="match : ${entry.value}" class="bk-slot">
                                        <div th:replace="~{fragments/view-card :: viewCard(${match})}"></div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${!iStat.last}" class="bk-gap"></div>
                        </th:block>
                    </div>
                </div>
            </div>

            <!-- Lower Bracket -->
            <div class="mb-4" th:unless="${bracketView.lowerRounds.isEmpty()}">
                <div class="bk-section-label lower-label">
                    <i class="bi bi-arrow-down-circle"></i>Lower Bracket
                </div>
                <div class="bk-scroll">
                    <div class="bk-stage">
                        <th:block th:each="entry, iStat : ${bracketView.lowerRounds}">
                            <div class="bk-round-col">
                                <div class="bk-round-label" th:text="'ROUND ' + ${entry.key}">R1</div>
                                <div class="bk-cards">
                                    <div th:each="match : ${entry.value}" class="bk-slot">
                                        <div th:replace="~{fragments/view-card :: viewCard(${match})}"></div>
                                    </div>
                                </div>
                            </div>
                            <div th:if="${!iStat.last}" class="bk-gap"></div>
                        </th:block>
                    </div>
                </div>
            </div>

            <!-- Grand Final -->
            <div class="mb-4" th:if="${bracketView.grandFinal != null}">
                <div class="bk-section-label final-label">
                    <i class="bi bi-trophy"></i>Grand Final
                </div>
                <div style="max-width:215px">
                    <div th:replace="~{fragments/view-card :: viewCard(${bracketView.grandFinal})}"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="view-footer">
    TournamentSystem · Bracket ini dapat dibagikan ke siapapun<br>
    <span style="color:#64748b;">Created by <strong>Ridhwan KN</strong></span>
</div>

<script>
/* Connector lines — same logic as detail page */
function drawConnectors() {
    document.querySelectorAll('.bk-stage').forEach(stage => {
        stage.querySelectorAll('.conn-svg').forEach(e => e.remove());
        const rounds = Array.from(stage.querySelectorAll(':scope > .bk-round-col'));
        if (rounds.length < 2) return;

        // Equalize slot heights across all rounds in this stage
        let globalMaxH = 0;
        rounds.forEach(round => {
            round.querySelectorAll('.bk-slot').forEach(s => {
                s.style.height = 'auto';
                globalMaxH = Math.max(globalMaxH, s.scrollHeight);
            });
        });

        const roundSlots = rounds.map(round => Array.from(round.querySelectorAll('.bk-slot')));
        const sectionText = (stage.closest('.mb-4')?.querySelector('.bk-section-label')?.textContent || '');
        const isUpperStage = /upper/i.test(sectionText);
        let prevTopPad = 0;
        let prevGap = 0;
        let prevCount = roundSlots[0]?.length || 0;

        rounds.forEach((round, ri) => {
            const cards = round.querySelector('.bk-cards');
            const slots = roundSlots[ri];
            let topPad = 0;
            let slotGap = 0;

            if (isUpperStage && ri > 0) {
                const multiplier = Math.pow(2, ri);
                topPad = ((multiplier - 1) * globalMaxH) / 2;
                slotGap = (multiplier - 1) * globalMaxH;
            } else if (!isUpperStage && ri > 0) {
                const currentCount = slots.length;
                if (currentCount === prevCount) {
                    topPad = prevTopPad;
                    slotGap = prevGap;
                } else if (currentCount > 0 && prevCount > 0 && prevCount % currentCount === 0) {
                    const ratio = prevCount / currentCount;
                    const prevStep = globalMaxH + prevGap;
                    topPad = prevTopPad + ((ratio - 1) * prevStep) / 2;
                    slotGap = Math.max(0, ratio * prevStep - globalMaxH);
                } else {
                    topPad = prevTopPad;
                    slotGap = prevGap;
                }
            }

            if (cards) cards.style.paddingTop = topPad + 'px';
            slots.forEach((s, idx) => {
                s.style.height = globalMaxH + 'px';
                s.style.marginBottom = idx < slots.length - 1 ? (slotGap + 'px') : '0px';
            });

            prevTopPad = topPad;
            prevGap = slotGap;
            prevCount = slots.length;
        });

        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.classList.add('conn-svg');
        svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:0;overflow:visible;';
        svg.setAttribute('width',  '1');
        svg.setAttribute('height', '1');
        stage.appendChild(svg);

        const stageRect = stage.getBoundingClientRect();

        for (let ri = 0; ri < rounds.length - 1; ri++) {
            const fromRound = rounds[ri];
            const toRound   = rounds[ri + 1];
            const fromSlots = Array.from(fromRound.querySelectorAll('.bk-slot'));
            const toSlots   = Array.from(toRound.querySelectorAll('.bk-slot'));
            if (!fromSlots.length || !toSlots.length) continue;

            const fromRect = fromRound.getBoundingClientRect();
            const toRect   = toRound.getBoundingClientRect();
            const x0 = fromRect.right - stageRect.left;
            const x1 = toRect.left    - stageRect.left;
            const xMid = (x0 + x1) / 2;

            const centerY = (slot) => {
                const r = slot.getBoundingClientRect();
                return r.top + r.height / 2 - stageRect.top;
            };
            const drawLine = (lx1, ly1, lx2, ly2) => {
                const l = document.createElementNS(svgNS, 'line');
                l.setAttribute('x1', lx1); l.setAttribute('y1', ly1);
                l.setAttribute('x2', lx2); l.setAttribute('y2', ly2);
                l.setAttribute('stroke', '#9aa5bc');
                l.setAttribute('stroke-width', '2.5');
                l.setAttribute('stroke-linecap', 'round');
                svg.appendChild(l);
            };

            if (toSlots.length >= fromSlots.length) {
                for (let i = 0; i < fromSlots.length; i++) {
                    const src = fromSlots[i];
                    const dst = toSlots[Math.min(toSlots.length - 1, Math.floor(i * toSlots.length / fromSlots.length))];
                    if (!src || !dst) continue;
                    const y0 = centerY(src);
                    const y1 = centerY(dst);
                    drawLine(x0, y0, xMid, y0);
                    drawLine(xMid, y0, xMid, y1);
                    drawLine(xMid, y1, x1, y1);
                }
            } else {
                for (let d = 0; d < toSlots.length; d++) {
                    const destSlot = toSlots[d];
                    if (!destSlot) continue;
                    let start = Math.floor(d * fromSlots.length / toSlots.length);
                    let end = Math.floor((d + 1) * fromSlots.length / toSlots.length) - 1;
                    start = Math.min(start, fromSlots.length - 1);
                    end = Math.max(start, Math.min(end, fromSlots.length - 1));

                    const topSlot = fromSlots[start];
                    const botSlot = fromSlots[end];
                    const destY = centerY(destSlot);
                    if (!topSlot || !botSlot) continue;

                    if (start === end) {
                        const y0 = centerY(topSlot);
                        drawLine(x0, y0, xMid, y0);
                        drawLine(xMid, y0, xMid, destY);
                        drawLine(xMid, destY, x1, destY);
                    } else {
                        const topY = centerY(topSlot);
                        const botY = centerY(botSlot);
                        drawLine(x0, topY, xMid, topY);
                        drawLine(xMid, topY, xMid, botY);
                        drawLine(x0, botY, xMid, botY);
                        drawLine(xMid, destY, x1, destY);
                    }
                }
            }
        }

        svg.setAttribute('width',  stage.scrollWidth);
        svg.setAttribute('height', stage.scrollHeight);
    });
}
window.addEventListener('load', () => {
    drawConnectors();
    setTimeout(drawConnectors, 200);
    setTimeout(drawConnectors, 600);
});
window.addEventListener('resize', drawConnectors);
</script>
</body>
</html>
