<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Home - Tournament System</title>
</head>
<body>
<section th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-trophy me-2 text-warning"></i>Tournament System</h2>
        <a th:href="@{/tournaments/create}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Buat Tournament Baru
        </a>
    </div>

    <div th:if="${tournaments.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-clipboard-x" style="font-size: 3rem;"></i>
        <p class="mt-3 fs-5">Belum ada tournament. Buat yang pertama!</p>
        <a th:href="@{/tournaments/create}" class="btn btn-outline-primary mt-2">
            <i class="bi bi-plus me-1"></i>Buat Tournament
        </a>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3" th:unless="${tournaments.isEmpty()}">
        <div class="col" th:each="t : ${tournaments}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0" th:text="${t.name}">Tournament Name</h5>
                        <span class="badge"
                              th:classappend="${t.status.name() == 'NOT_STARTED'} ? 'bg-secondary' : (${t.status.name() == 'ONGOING'} ? 'bg-primary' : 'bg-success')"
                              th:text="${t.status.name() == 'NOT_STARTED'} ? 'Belum Mulai' : (${t.status.name() == 'ONGOING'} ? 'Berlangsung' : 'Selesai')">
                            Status
                        </span>
                    </div>
                    <p class="text-muted small mb-2">
                        <i class="bi bi-diagram-3 me-1"></i>
                        <span th:text="${t.type.name().replace('_', ' ')}">Type</span>
                    </p>
                    <p class="text-muted small mb-0">
                        <i class="bi bi-calendar me-1"></i>
                        <span th:text="${#temporals.format(t.createdAt, 'dd MMM yyyy HH:mm')}">Date</span>
                    </p>
                </div>
                <div class="card-footer bg-transparent">
                    <a th:href="@{/tournaments/{id}(id=${t.id})}" class="btn btn-outline-primary btn-sm w-100">
                        <i class="bi bi-eye me-1"></i>Lihat Detail
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
