<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Tournament System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
    /* ── Base ──────────────────────────────────────────── */
    body { background: #f0f2f8; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
    .navbar-brand { font-weight: 700; }

    /* ── Sidebar ───────────────────────────────────────── */
    .sidebar-col { min-width: 170px; max-width: 170px; flex-shrink: 0; }
    .side-card   { background:#fff; border:1px solid #e2e5ef; border-radius:8px; overflow:hidden; }
    .side-head   { background:#f5f6fa; padding:6px 10px; font-size:.72rem; font-weight:700; color:#374151; border-bottom:1px solid #e2e5ef; }
    .side-row    { display:flex; justify-content:space-between; align-items:center; padding:3px 8px; border-bottom:1px solid #f3f4f6; font-size:.72rem; }
    .side-seed   { color:#aab; margin-right:3px; }
    .side-del    { background:none; border:none; color:#f87171; cursor:pointer; font-size:.68rem; padding:0 2px; }
    .p-badge     { font-size:.55rem; font-weight:700; border-radius:3px; padding:1px 5px; white-space:nowrap; }
    .st-active   { background:#dbeafe; color:#1d4ed8; }
    .st-lower    { background:#fef3c7; color:#92400e; }
    .st-champ    { background:#d1fae5; color:#065f46; }
    .st-out      { background:#fee2e2; color:#991b1b; }

    /* ── Section titles ────────────────────────────────── */
    .bk-section-label {
        display:inline-flex; align-items:center; gap:6px;
        font-size:.72rem; font-weight:700; padding:3px 12px;
        border-radius:20px; margin-bottom:10px;
    }
    .upper-label { background:#dbeafe; color:#1e40af; }
    .lower-label { background:#fef3c7; color:#92400e; }
    .final-label { background:#ede9fe; color:#5b21b6; }

    /* ── Bracket scroll wrapper ────────────────────────── */
    .bk-scroll  { overflow-x:auto; overflow-y:visible; padding-bottom:12px; }

    /* ── Row of rounds ─────────────────────────────────── */
    .bk-rounds  {
        display:flex;
        align-items:flex-start;
        gap:0;
        min-width:max-content;
    }

    /* ── One round column ──────────────────────────────── */
    .bk-round {
        display:flex;
        flex-direction:column;
        align-items:center;
        width:230px;
        flex-shrink:0;
    }
    .bk-round-label {
        font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:1px;
        color:#c4882a; background:#fffbeb; border:1px solid #fde68a;
        border-radius:20px; padding:2px 14px; margin-bottom:12px; white-space:nowrap;
    }

    /* Stack of match cells */
    .bk-col {
        display:flex;
        flex-direction:column;
        width:100%;
        /* gap between cards is handled by connector height matching */
    }

    .bk-cell {
        position: relative;
        /* margin-bottom added dynamically to create vertical spacing */
        margin-bottom: 12px;
    }
    .bk-cell:last-child { margin-bottom: 0; }

    /* ── Connector column ──────────────────────────────── */
    /*
      The connector column sits between two round columns.
      It contains N/2 connector "brackets".
      Each bracket: top-arm ─┐ vertical bar │ bottom-arm ─┘
      then a horizontal arrow ── to the next card.

      We use a fixed card height (CARD_H) + gap to align.
      CARD_H = 88px (match card without form)
      GAP    = 12px
    */
    .bk-conn-col {
        display:flex;
        flex-direction:column;
        width:50px;
        flex-shrink:0;
        padding-top:34px; /* align below round label */
    }

    .bk-bracket {
        display:flex;
        flex-direction:column;
        position:relative;
        /* height = 2 cards + gap between them */
        height: calc(2 * 88px + 12px);
        margin-bottom: 12px; /* gap between bracket groups */
    }
    .bk-bracket:last-child { margin-bottom: 0; }

    /* Right-side vertical bar + horizontal arms (using borders) */
    .bk-bracket::before {
        content:'';
        position:absolute;
        right:50%;
        top: calc(88px / 2);               /* start at mid of top card */
        bottom: calc(88px / 2);            /* end at mid of bottom card */
        width: 2px;
        background: #9aa5bc;
    }
    /* Top horizontal arm */
    .bk-bracket::after {
        content:'';
        position:absolute;
        right: 50%;
        top: calc(88px / 2);
        width: 50%;
        height: 2px;
        background: #9aa5bc;
    }
    /* We need two pseudo-elements; use a child span for bottom arm + output line */
    .bk-bracket-arms {
        position:absolute;
        inset:0;
        pointer-events:none;
    }
    /* Bottom arm */
    .bk-arm-bottom {
        position:absolute;
        right:50%;
        bottom: calc(88px / 2);
        width:50%;
        height:2px;
        background:#9aa5bc;
    }
    /* Output horizontal line from mid-point to right edge */
    .bk-arm-out {
        position:absolute;
        right:0;
        top:50%;
        width:50%;
        height:2px;
        background:#9aa5bc;
        transform:translateY(-50%);
    }

    /* ── Match card ────────────────────────────────────── */
    .bk-card {
        width: 210px;
        background: #fff;
        border: 1.5px solid #dde2ea;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    .bk-card.is-ready   { border-color: #f87171; }
    .bk-card.is-done    { border-color: #86efac; }
    .bk-card.is-pending { opacity: .6; }

    .bk-card-head {
        display:flex; justify-content:space-between; align-items:center;
        padding:3px 8px; background:#f8f9fc; border-bottom:1px solid #eef0f5;
    }
    .bk-card-num  { font-size:.58rem; font-weight:700; color:#6b7280; letter-spacing:.4px; }
    .bk-badge-live { font-size:.55rem; font-weight:700; background:#f87171; color:#fff; border-radius:3px; padding:1px 5px; }
    .bk-badge-done { font-size:.55rem; font-weight:700; background:#86efac; color:#166534; border-radius:3px; padding:1px 5px; }

    /* Participant row = dropdown + score input + WIN/LOSE badge */
    .bk-prow {
        display:flex; align-items:center; gap:4px;
        padding:5px 7px; border-bottom:1px solid #f3f4f6; min-height:32px;
    }
    .bk-prow:last-of-type { border-bottom:none; }

    /* dropdown select for participant name */
    .bk-pname-select {
        flex:1; min-width:0;
        border:1px solid #e5e7eb; border-radius:4px;
        font-size:.75rem; color:#1f2937;
        padding:2px 4px; background:#fff;
        -webkit-appearance:auto;
    }
    .bk-pname-select:disabled {
        background:#f9fafb; color:#6b7280; border-color:#e5e7eb;
    }
    /* static name (no dropdown, for pending/done cards) */
    .bk-pname-static {
        flex:1; font-size:.78rem; color:#374151;
        overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .bk-pname-static.tbd  { color:#b8c0cc; font-style:italic; font-size:.72rem; }
    .bk-pname-static.win  { font-weight:700; color:#166534; }
    .bk-pname-static.lose { color:#9ca3af; text-decoration:line-through; }

    /* score input */
    .bk-sinput {
        width:30px; text-align:center;
        border:1px solid #e5e7eb; border-radius:4px;
        font-size:.78rem; font-weight:700; padding:2px 2px;
        background:#f9fafb; color:#374151;
        flex-shrink:0;
    }
    .bk-sinput:focus { outline:none; border-color:#f87171; background:#fff; }
    /* static score display */
    .bk-sval {
        width:22px; text-align:center;
        font-size:.78rem; font-weight:700; color:#374151; flex-shrink:0;
    }
    .bk-sval.win  { color:#166534; }
    .bk-sval.dash { color:#b8c0cc; }

    /* WIN / LOSE badge */
    .bk-wl {
        font-size:.55rem; font-weight:800; border-radius:3px;
        padding:1px 4px; flex-shrink:0; min-width:28px; text-align:center;
    }
    .bk-wl.win  { background:#d1fae5; color:#065f46; }
    .bk-wl.lose { background:#fee2e2; color:#991b1b; }
    .bk-wl.empty{ background:#f3f4f6; color:#9ca3af; }

    /* Submit button inside card */
    .bk-submit-row {
        padding:5px 7px;
        border-top:1px solid #fee2e2;
        background:#fff9f9;
    }
    .bk-submit-btn {
        width:100%; padding:3px; font-size:.7rem; font-weight:700;
        background:#ef4444; color:#fff; border:none; border-radius:4px; cursor:pointer;
    }
    .bk-submit-btn:hover { background:#dc2626; }
    .bk-submit-btn:disabled { background:#fca5a5; cursor:default; }

    /* Edit button on DONE cards */
    .bk-edit-row {
        padding: 3px 7px 5px;
        border-top: 1px solid #e5e7eb;
        background: #f9fafb;
    }
    .bk-edit-btn {
        width: 100%; padding: 2px; font-size: .65rem; font-weight: 600;
        background: transparent; color: #6b7280;
        border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer;
    }
    .bk-edit-btn:hover { background: #f3f4f6; color: #374151; border-color: #9ca3af; }

    /* ── Champion ──────────────────────────────────────── */
    .champion-card {
        background:linear-gradient(135deg,#fbbf24,#f59e0b);
        border-radius:12px; padding:18px; text-align:center; color:#1c1917; margin-bottom:16px;
    }
    .champion-name { font-size:1.8rem; font-weight:800; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container-fluid px-4">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-trophy-fill me-2"></i>TournamentSystem
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>Home</a>
            <a class="nav-link" th:href="@{/tournaments/create}"><i class="bi bi-plus-circle me-1"></i>New</a>
        </div>
    </div>
</nav>
<div class="container-fluid px-4 pb-5">
    <div th:replace="${content}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
