[build]
builder = "nixpacks"
buildCommand = "mvn clean package -DskipTests"

[deploy]
startCommand = "java -Dspring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE} -Dspring.datasource.username=${PGUSER} -Dspring.datasource.password=${PGPASSWORD} -Dspring.datasource.driver-class-name=org.postgresql.Driver -Dspring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect -jar target/tournament-0.0.1-SNAPSHOT.jar"
restartPolicyType = "on_failure"
